baseURL: "https://gibeonita.com.br/"
title: O Gibeonita
paginate: 5
theme: PaperMod

defaultContentLanguage: pt-br
languageCode: pt-br

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: O Gibeonita
  description: "Blog pessoal de O Gibeonita"
  author: O Gibeonita
  DateFormat: "02/01/2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  showtoc: false
  tocopen: false
  comments: false
  hidemeta: false
  hideSummary: false

  profileMode:
    enabled: true
    title: "O Gibeonita"
    subtitle: "Blog pessoal"
    imageUrl: "/images/avatar.jpg"
    imageWidth: 120
    imageHeight: 120
    imageTitle: "O Gibeonita"
    buttons:
      - name: Posts
        url: /posts
      - name: Sobre
        url: /about

  socialIcons:
    - name: rss
      url: "/index.xml"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: sobre
      name: Sobre
      url: /about/
      weight: 20
    - identifier: search
      name: Buscar
      url: /search/
      weight: 30

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
